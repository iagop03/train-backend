spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: false
    validate-on-migrate: true
    clean-disabled: true
    locations: classpath:db/migration

  data:
    mongodb:
      uri: ${MONGO_URI}

logging:
  level:
    root: WARN
    com.train: INFO
    org.springframework.security: WARN
    org.flywaydb: INFO
  file:
    name: logs/train-backend.log
    max-size: 50MB
    max-history: 30

server:
  port: 8080
  compression:
    enabled: true
    min-response-size: 1024
