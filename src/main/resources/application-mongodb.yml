spring:
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb+srv://${MONGODB_USER}:${MONGODB_PASSWORD}@${MONGODB_HOST}/train?retryWrites=true&w=majority}
      auto-index-creation: true
      database: train_db

  mongock:
    change-logs-scan-package:
      - com.train.config.migrations

logging:
  level:
    org.springframework.data.mongodb: DEBUG
    com.train: INFO
