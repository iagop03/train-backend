spring:
  application:
    name: train-backend
  profiles:
    active: dev
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:train_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb+srv://user:password@localhost/train_db}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/train}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/train/protocol/openid-connect/certs}

keycloak:
  realm: ${KEYCLOAK_REALM:train}
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080}
  resource: ${KEYCLOAK_CLIENT_ID:train-backend}
  credentials:
    secret: ${KEYCLOAK_CLIENT_SECRET}
  ssl-required: external
  public-client: false
  use-resource-role-mappings: true

server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.train: DEBUG
    org.springframework.security: DEBUG