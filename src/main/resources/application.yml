spring:
  application:
    name: train-backend
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/train
          jwk-set-uri: http://localhost:8080/realms/train/protocol/openid-connect/certs
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  datasource:
    url: jdbc:postgresql://localhost:5432/train_db
    username: train_user
    password: ${DB_PASSWORD:train_password}
    driver-class-name: org.postgresql.Driver
  data:
    mongodb:
      uri: mongodb+srv://${MONGO_USER}:${MONGO_PASSWORD}@${MONGO_HOST}/train?retryWrites=true&w=majority
      database: train

server:
  port: 8081
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    com.train: DEBUG
    org.springframework.security: DEBUG