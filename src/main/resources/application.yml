spring:
  application:
    name: train-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb+srv://user:pass@mongodb.mongodb.net/train?retryWrites=true&w=majority}

  cloud:
    gcp:
      secret-manager:
        project-id: ${GCP_PROJECT_ID:train-ai-gym}
      project-id: ${GCP_PROJECT_ID:train-ai-gym}

keycloak:
  realm: ${KEYCLOAK_REALM:train}
  auth-server-url: ${KEYCLOAK_SERVER_URL:http://localhost:8080}
  ssl-required: ${KEYCLOAK_SSL_REQUIRED:external}
  resource: ${KEYCLOAK_CLIENT_ID:train-backend}
  credentials:
    secret: ${KEYCLOAK_CLIENT_SECRET:secret}

logging:
  level:
    root: INFO
    com.train: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

app:
  environment: ${ENVIRONMENT:dev}
  version: @project.version@