spring:
  application:
    name: train-api
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/train}
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:8080/realms/train/protocol/openid-connect/certs}

keycloak:
  realm: train
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8080}
  resource: train-api
  credentials:
    secret: ${KEYCLOAK_CLIENT_SECRET}
  ssl-required: external
  use-resource-role-mappings: true

oauth2:
  providers:
    google:
      client-id: ${GOOGLE_CLIENT_ID}
      client-secret: ${GOOGLE_CLIENT_SECRET}
      redirect-uri: ${KEYCLOAK_REDIRECT_URI:http://localhost:8080}/auth/realms/train/broker/google/endpoint
    apple:
      client-id: ${APPLE_CLIENT_ID}
      team-id: ${APPLE_TEAM_ID}
      key-id: ${APPLE_KEY_ID}
      private-key: ${APPLE_PRIVATE_KEY}
      redirect-uri: ${KEYCLOAK_REDIRECT_URI:http://localhost:8080}/auth/realms/train/broker/apple/endpoint