spring:
  application:
    name: train-backend-test
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8080/realms/train
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  data:
    mongodb:
      uri: mongodb://localhost:27017/train_test

server:
  port: 0

logging:
  level:
    root: WARN
    com.train: DEBUG
    org.springframework.security: DEBUG