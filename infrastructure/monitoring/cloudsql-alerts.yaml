# Cloud SQL Monitoring and Alerting Configuration
apiVersion: monitoring.googleapis.com/v3
kind: AlertPolicy
metadata:
  displayName: "Cloud SQL - CPU Utilization High"
spec:
  conditions:
    - displayName: "CPU utilization > 80%"
      conditionThreshold:
        filter: |
          resource.type="cloudsql_database"
          metric.type="cloudsql.googleapis.com/database/cpu/utilization"
          resource.label.database_id=~".*train-postgres-prod"
        comparison: COMPARISON_GT
        thresholdValue: 0.8
        duration: "300s"
        aggregations:
          - alignmentPeriod: "60s"
            perSeriesAligner: ALIGN_MEAN
  combiner: OR
  enabled: true
  notificationChannels:
    - "projects/PROJECT_ID/notificationChannels/CHANNEL_ID"
  alertStrategy:
    autoClose: "86400s"
---
apiVersion: monitoring.googleapis.com/v3
