---
apiVersion: monitoring.googleapis.com/v3
kind: AlertPolicy
metadata:
  displayName: "Cloud SQL - Backup Failed"
spec:
  conditions:
    - displayName: "Backup completion status"
      conditionThreshold:
        filter: |
          resource.type="cloudsql_database"
          metric.type="cloudsql.googleapis.com/database/backup/status"
          resource.label.database_id=~".*train-postgres-prod"
        comparison: COMPARISON_NE
        thresholdValue: 1
        duration: "3600s"
        aggregations:
          - alignmentPeriod: "60s"
            perSeriesAligner: ALIGN_MAX
  combiner: OR
  enabled: true
  notificationChannels:
    - "projects/PROJECT_ID/notificationChannels/CHANNEL_ID"
  alertStrategy:
    autoClose: "86400s"
---
apiVersion: monitoring.googleapis.com/v3
kind: AlertPolicy
metadata:
  displayName: "Cloud SQL - Replication Lag High"
spec:
  conditions:
    - displayName: "Replication lag > 10 seconds"
      conditionThreshold:
        filter: |
          resource.type="cloudsql_database"
          metric.type="cloudsql.googleapis.com/database/replication/replica_lag"
          resource.label.database_id=~".*train-postgres-prod"
        comparison: COMPARISON_GT
        thresholdValue: 10
        duration: "300s"
        aggregations:
          - alignmentPeriod: "60s"
            perSeriesAligner: ALIGN_MAX
  combiner: OR
  enabled: true
  notificationChannels:
    - "projects/PROJECT_ID/notificationChannels/CHANNEL_ID"
  alertStrategy:
    autoClose: "86400s"
