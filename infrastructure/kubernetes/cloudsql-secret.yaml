apiVersion: v1
kind: Secret
metadata:
  name: cloudsql-credentials
  namespace: train
  labels:
    app: train
    component: database
type: Opaque
stringData:
  # These should be injected from Terraform/GCP secrets manager
  username: train_app
  password: "${CLOUDSQL_APP_PASSWORD}" # Replace via helm/kustomize
  host: "${CLOUDSQL_PRIVATE_IP}" # Replaced via helm/kustomize
  port: "5432"
  database: train
  connection-name: "${CLOUDSQL_CONNECTION_NAME}" # Replaced via helm/kustomize
  jdbc-url: "jdbc:postgresql://${CLOUDSQL_PRIVATE_IP}:5432/train?sslmode=require"
---
apiVersion: v1
kind: Secret
metadata:
  name: cloudsql-ssl-certs
  namespace: train
  labels:
    app: train
    component: database
type: Opaque
stringData:
  ca.pem: |
    ${CLOUDSQL_SERVER_CA_CERT}
  client-cert.pem: |
    ${CLOUDSQL_CLIENT_CERT}
  client-key.pem: |
    ${CLOUDSQL_CLIENT_KEY}
