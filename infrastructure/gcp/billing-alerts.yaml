# Google Cloud Billing Alerts Configuration for TrAIn
# Define budget alerts and cost anomaly detection

apiVersion: v1
kind: BillingBudget
metadata:
  name: train-monthly-budget
  namespace: default
spec:
  displayName: "TrAIn Monthly Budget - Production"
  budgetFilter:
    projects:
      - "projects/train-ai-gym-tracker"
    services:
      - "services/95FF-2EF5-5EA1"  # Cloud Run
      - "services/6F81-5844-456A"  # Cloud SQL
      - "services/95FD-40E4-A7B4"  # Cloud Build
      - "services/A3CE-4B22-22F6"  # Cloud Storage
      - "services/5140-52BD-9915"  # Cloud Pub/Sub
  
  amount:
    currencyCode: "USD"
    units: "100"  # $100 USD
  
  thresholdRules:
    - thresholdPercent: 50
      spendBasisComparison: CURRENT_SPEND
    - thresholdPercent: 75
      spendBasisComparison: CURRENT_SPEND
    - thresholdPercent: 90
      spendBasisComparison: CURRENT_SPEND
    - thresholdPercent: 100
      spendBasisComparison: CURRENT_SPEND
  
  notificationsRule:
    enableProjectLevelRecipients: true
    monitoringNotificationChannels:
      - "projects/train-ai-gym-tracker/notificationChannels/1234567890"

---
apiVersion: v1
kind: BillingBudget
metadata:
  name: train-staging-budget
  namespace: default
spec:
  displayName: "TrAIn Monthly Budget - Staging"
  budgetFilter:
    projects:
      - "projects/train-ai-gym-tracker-staging"
  
  amount:
    currencyCode: "USD"
    units: "50"  # $50 USD
  
  thresholdRules:
    - thresholdPercent: 75
      spendBasisComparison: CURRENT_SPEND
    - thresholdPercent: 90
      spendBasisComparison: CURRENT_SPEND
    - thresholdPercent: 100
      spendBasisComparison: CURRENT_SPEND
  
  notificationsRule:
    enableProjectLevelRecipients: true
