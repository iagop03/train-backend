name: Database Migration CI/CD

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/main/resources/db/migration/**'
      - 'pom.xml'
      - '.github/workflows/database-migration.yml'
  pull_request:
    branches: [ main, develop ]

jobs:
  validate-migrations:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: train_db_test
          POSTGRES_USER: train_user
          POSTGRES_PASSWORD: train_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            pg_isready -h localhost -p 5432 -U train_user && exit 0
            sleep 2
          done
          exit 1

      - name: Run Flyway validate
        run: mvn flyway:validate -Dflyway.url=jdbc:postgresql://localhost:5432/train_db_test -Dflyway.user=train_user -Dflyway.password=train_password

      - name: Run Flyway info
        run: mvn flyway:info -Dflyway.url=jdbc:postgresql://localhost:5432/train_db_test -Dflyway.user=train_user -Dflyway.password=train_password

      - name: Run Flyway migrate (test)
        run: mvn flyway:migrate -Dflyway.url=jdbc:postgresql://localhost:5432/train_db_test -Dflyway.user=train_user -Dflyway.password=train_password

      - name: Verify database schema
        run: |
          PGPASSWORD=train_password psql -h localhost -U train_user -d train_db_test -c "\\dt public.*" 
          PGPASSWORD=train_password psql -h localhost -U train_user -d train_db_test -c "SELECT * FROM flyway_schema_history ORDER BY installed_rank DESC LIMIT 5;"

  test-application:
    runs-on: ubuntu-latest
    needs: validate-migrations
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: train_db_test
          POSTGRES_USER: train_user
          POSTGRES_PASSWORD: train_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests with migrations
        run: mvn clean test -Dspring.datasource.url=jdbc:postgresql://localhost:5432/train_db_test -Dspring.datasource.username=train_user -Dspring.datasource.password=train_password

  notify:
    runs-on: ubuntu-latest
    needs: test-application
    if: always()
    
    steps:
      - name: Migration validation result
        run: echo "Database migrations validated and tested successfully!"
